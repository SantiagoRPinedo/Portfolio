<section id="proyectos-personales">
    <div class="section-container">
        <h2 class="section-title fade-in-element" data-key="ui_text.projects.title">{{ ui_text.projects.title.es }}</h2>
        <div class="gallery-grid">
            {% for proyecto in proyectos %}
            <div class="retro-window fade-in-element proyecto-cuadro" data-modal-id="{{ proyecto.id }}" style="cursor: pointer; transition: transform 0.2s;">
                <div class="retro-title-bar bg-magenta">
                    <span class="window-title" data-key="proyectos_personales.{{ loop.index0 }}.titulo">{{ proyecto.titulo.es }}</span>
                    <div class="window-controls"><span>_</span><span>☐</span><span>X</span></div>
                </div>
                <div class="retro-window-content" style="padding: 0; position: relative;">
                    <img src="{{ url_for('static', filename=proyecto.img) }}" alt="{{ proyecto.titulo.es }}" style="width: 100%; height: 100%; object-fit: cover; display: block;">
                    <div class="proyecto-overlay" style="opacity: 0;"></div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
